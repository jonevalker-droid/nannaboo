databases:
  - name: nannaboo-db
    plan: free
    # Requires PostGIS: enabled by migration 001 (CREATE EXTENSION postgis),
    # which Render Postgres supports on all plans.

services:
  - type: web
    name: nannaboo
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nannaboo-db
          property: connectionString
      # Guards POI write routes (/api/pois POST/PUT/DELETE + seed-demo).
      # sync: false -> Render prompts for the value on Blueprint sync; pick
      # something short enough to type on a phone. Repo is public, so the
      # value must never be committed here.
      - key: ADMIN_KEY
        sync: false
