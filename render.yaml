databases:
  - name: nannaboo-db
    plan: free
    # Requires PostGIS: enabled by migration 001 (CREATE EXTENSION postgis),
    # which Render Postgres supports on all plans.

services:
  - type: web
    name: nannaboo
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: nannaboo-db
          property: connectionString
